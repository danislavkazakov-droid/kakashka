<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Случайная картинка на весь экран</title>
    <style>
        /* Сбрасываем отступы и делаем body на весь экран */
        * {
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* убираем полосы прокрутки */
        }
        body {
            background-size: cover;      /* растягиваем на весь экран */
            background-position: center; /* центрируем */
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <script>
        // Генерируем уникальную ссылку, чтобы избежать кеширования
        const unique = Date.now() + Math.random();
        document.body.style.backgroundImage = 
            `url('https://picsum.photos/1920/1080?random=${unique}')`;
    </script>
</body>
</html>
